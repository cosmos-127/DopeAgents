repos:
  # Code linting + formatting with ruff (includes isort)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.5
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml, --no-incremental, --explicit-package-bases, --warn-unused-ignores]
        files: ^(dopeagents|tests|scripts)/
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - instructor
          - litellm
          - langgraph
          - typing-extensions
          - pytest
