name: Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality:
    name: ruff · mypy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: ruff lint
        run: uv run python -m ruff check dopeagents/ tests/

      - name: ruff format (check)
        run: uv run python -m ruff format dopeagents/ tests/ --check

      - name: mypy
        run: >
          uv run python -m mypy dopeagents/ tests/
          --no-incremental
          --explicit-package-bases
          --warn-unused-ignores
